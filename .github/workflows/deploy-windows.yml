name: CI/CD Windows Deployment via GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.string.outputs.image_tag }}
      container_name: ${{ steps.string.outputs.container_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ล็อกอินเข้าสู่ GitHub Container Registry (ghcr.io) โดยใช้ตั๋วที่เตรียมไว้
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      # จัดการแปลงชื่อ URL และ Repo ที่มีตัวพิมพ์ใหญ่ ให้กลายเป็นตัวพิมพ์เล็กทั้งหมด
      # แล้วพ่นค่าออกไปที่ระบบ Output ของ Step
      - name: Downcase Repository Name
        id: string
        run: |
          IMAGE_URL="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest"
          echo "image_tag=$(echo $IMAGE_URL | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          REPO_NAME="${{ github.event.repository.name }}-container"
          echo "container_name=$(echo $REPO_NAME | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ดึงค่าที่แปลงเป็นตัวพิมพ์เล็กแล้วมาใช้งาน (เคลียร์ปัญหาแจ้งเตือนสีเหลืองกวนใจ)
          tags: ${{ steps.string.outputs.image_tag }} 
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-windows:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Execute Remote SSH Commands on Windows
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true # สั่งให้หยุดรันสคริปต์ทันทีหากมีคำสั่งใดทำงานผิดพลาด
          script: |
            powershell -NoProfile -NonInteractive -Command "$imageTag = 'ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest'.ToLower(); $containerName = '${{ github.event.repository.name }}-container'.ToLower(); if (-not (Test-Path 'C:\app-data\todo-list-db')) { New-Item -ItemType Directory -Force -Path 'C:\app-data\todo-list-db' | Out-Null }; if (-not (Test-Path 'C:\app-data\todo-list-db\.env')) { Write-Error 'ERROR: C:\app-data\todo-list-db\.env file is MISSING!'; exit 1 }; $dockerConfigDir = 'C:\app-data\todo-list-db\.docker'; if (-not (Test-Path $dockerConfigDir)) { New-Item -ItemType Directory -Force -Path $dockerConfigDir | Out-Null }; $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes('${{ secrets.DOCKER_REGISTRY_USER }}:${{ secrets.DOCKER_REGISTRY_TOKEN }}')); $config = @{ auths = @{ 'ghcr.io' = @{ auth = $auth } } }; $configFilePath = $dockerConfigDir + '\config.json'; $config | ConvertTo-Json -Depth 3 | Out-File -FilePath $configFilePath -Encoding ASCII; $env:DOCKER_CONFIG = $dockerConfigDir; docker pull $imageTag; if ($LASTEXITCODE -ne 0) { Write-Error 'Docker pull failed'; exit 1 }; docker rm -f $containerName 2>&1 | Out-Null; docker run -d --name $containerName -p 3000:3000 -v 'C:\app-data\todo-list-db:/app/db' -e DATABASE_URL='file:/app/db/dev.db' --env-file 'C:\app-data\todo-list-db\.env' --restart unless-stopped $imageTag; if ($LASTEXITCODE -ne 0) { Write-Error 'Docker run failed'; exit 1 }; docker image prune -f"
