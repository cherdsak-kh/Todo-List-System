name: CI/CD Windows Deployment via GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ล็อกอินเข้าสู่ GitHub Container Registry (ghcr.io) โดยใช้ตั๋วที่เตรียมไว้
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      # จัดการแปลงชื่อ URL และ Repo ที่มีตัวพิมพ์ใหญ่ ให้กลายเป็นตัวพิมพ์เล็กทั้งหมด
      # แล้วพ่นค่าออกไปที่ระบบ Output ของ Step
      - name: Downcase Repository Name
        id: string
        run: |
          IMAGE_URL="ghcr.io/${{ secrets.DOCKER_REGISTRY_USER }}/${{ github.event.repository.name }}:latest"
          echo "image_tag=$(echo $IMAGE_URL | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ดึงค่าที่แปลงเป็นตัวพิมพ์เล็กแล้วมาใช้งาน (เคลียร์ปัญหาแจ้งเตือนสีเหลืองกวนใจ)
          tags: ${{ steps.string.outputs.image_tag }} 
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-windows:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Execute Remote SSH Commands on Windows
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true # สั่งให้หยุดรันสคริปต์ทันทีหากมีคำสั่งใดทำงานผิดพลาด
          script: |
            # ใช้ PowerShell บน Windows แปลงชื่อทุกอย่างเป็นตัวพิมพ์เล็กเพื่อความแม่นยำในการระบุ Container
            $imageTag = "ghcr.io/${{ secrets.DOCKER_REGISTRY_USER }}/${{ github.event.repository.name }}:latest".ToLower()
            $containerName = "${{ github.event.repository.name }}-container".ToLower()
            
            # 1. Login เข้า ghcr.io ผ่านท่อ SSH บนเครื่องเซิร์ฟเวอร์ปลายทาง
            echo "${{ secrets.DOCKER_REGISTRY_TOKEN }}" | docker login ghcr.io -u "${{ secrets.DOCKER_REGISTRY_USER }}" --password-stdin
            
            # 2. Pull Image เวอร์ชั่นล่าสุดลงมาจาก GitHub Packages
            docker pull $imageTag
            
            # 3. ตรวจสอบคอนเทนเนอร์เดิมในเครื่อง (ถ้ามีให้หยุดการทำงานและลบทิ้งก่อนรันตัวใหม่)
            if (docker ps -a --format "{{.Names}}" | Select-String -Pattern "^$containerName$") {
                Write-Host "Stopping and removing existing container: $containerName..."
                docker stop $containerName
                docker rm $containerName
            }
            
            # 4. สั่งรัน Container ตัวใหม่ 
            # (หมายเหตุ: สไตล์ PowerShell จะใช้เครื่องหมาย Backtick ` ในการขึ้นบรรทัดใหม่ แทนเครื่องหมาย Backslash \)
            docker run -d `
              --name $containerName `
              -p 80:3000 `
              --restart unless-stopped `
              $imageTag
              
            # 5. สั่งล้าง Image เก่าๆ ที่ไม่ได้ใช้งาน (Dangling Images) เพื่อเซฟพื้นที่ดิสก์ของ Windows
            docker image prune -f
